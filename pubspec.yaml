name: video_pool
description: Video orchestration for Flutter - controller pooling, instance reuse, visibility lifecycle, thermal throttling, disk caching, and ready-to-use widgets.
version: 0.3.1
homepage: https://github.com/abdullahtas0/video-pool
repository: https://github.com/abdullahtas0/video-pool
issue_tracker: https://github.com/abdullahtas0/video-pool/issues
topics:
  - video
  - video-player
  - media
  - cache
  - performance

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

flutter:
  plugin:
    platforms:
      android:
        package: com.videopool
        pluginClass: VideoPoolPlugin
      ios:
        pluginClass: VideoPoolPlugin

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.3
  media_kit: ^1.2.6
  media_kit_libs_video: ^1.0.7
  media_kit_video: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
